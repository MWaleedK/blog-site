{% extends 'blog/base.html' %} {% block content %} {% load static %}
<article class="post">
  <aside class="actions">
    {% if user.is_authenticated %}
    <a class="btn btn-secondary" href="{% url 'post_edit' pk=post.pk %}">
        <img src="{% static 'icons/pencil-fill.svg' %}" alt="edit post" />
    </a>
    <form action="{% url 'post_remove' pk=post.pk %}" method="POST" class="delete-form">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
    </form>
    {% endif %}
</aside>
  {% if post.published_date %}
  <div class="date">{{ post.published_date }}</div>

  {% else %}
  <aside class="actions">
    <form action="{% url 'post_publish' pk=post.pk %}" method="POST">
      {% csrf_token %}
      <button type="submit" class="btn btn-secondary">Publish</button>
    </form>
  </aside>

  {% endif %}
  <h2>{{ post.title }}</h2>
  <p>{{ post.text|linebreaksbr }}</p>
</article>
{% endblock %}
